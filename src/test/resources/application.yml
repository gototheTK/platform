spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  messages:
    # 경로/파일앞부분이름
    # "messages 폴더 안에 있는 message로 시작하는 파일들을 찾아라" 라는 뜻
    basename: messages/message
    encoding: UTF-8

  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

    hikari:
      # DB 타임아웃보다 약 15~30초 짧게 설정 (단위: ms)
      max-lifetime: 30000
      # 커넥션을 획득하기 위해 대기하는 최대 시간
      connection-timeout: 30000
      # 풀에 유지할 최소 유휴 커넥션 수
      minimum-idle: 10
      # 풀의 최대 커넥션 수 (max_connection 고려)
      maximum-pool-size: 50
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        default_batch_fetch_size: 50
        format_sql: true
        show_sql: true
    defer-datasource-initialization: true

  logging:
    file:
      name: ./logs/test-heavy-load.log # 프로젝트 루트의 logs 폴더 안에 생성
    logback:
      rollingpolicy:
        # 로그 파일의 최대 용량 (10MB가 넘으면 압축하고 새 파일 생성)
        max-file-size: 10MB
        # 보관 기간 (30일 지난 로그는 자동 삭제)
        max-history: 7
        # 로그 파일 이름 패턴 (날짜별로 저장)
        file-name-pattern: "${LOG_FILE}.%d{yyyy-MM-dd}.%i.gz"

    level:
      root: info
      app.project.platform: debug
      org.hibernate.SQL: debug

file:
  dir: ./images/
