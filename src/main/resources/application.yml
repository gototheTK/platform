server:
  tomcat:
    threads:
      max: 400 #톰캣의 스레드 (기본 200)
    accept-count: 500 # 톰캣의 스레드외에 대기하는 스레드들

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  messages:
    # 경로/파일앞부분이름
    # "messages 폴더 안에 있는 message로 시작하는 파일들을 찾아라" 라는 뜻
    basename: messages/message
    encoding: UTF-8

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  datasource:
    # rewriteBatchedStatements=true가 없으면 Batch Insert가 발동하지 않는다.
    url: ${SERVER_DB_URL}
    username: ${SERVER_DB_USERNAME}
    password: ${SERVER_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    #url: ${SERVER_DB_URL}
    #username: ${SERVER_DB_USERNAME}
    #password: ${SERVER_DB_PASSWORD}
    #driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      # AWS RDS의 기본 타임아웃은 보통 15~30분입니다.
      # 이보다 살짝 짧은 10분(600,000ms) 정도로 설정하여 안전하게 커넥션을 순환시킵니다.
      max-lifetime: 580000

      # 장애 전파 방지 (Fail-fast): 커넥션이 없으면 3초만 기다리고 빠르게 에러 반환
      connection-timeout: 3000

      # 풀 사이즈 고정: 성능 최적화를 위해 minimum-idle과 maximum-pool-size를 동일하게 맞춥니다.
      minimum-idle: 10
      # 풀의 최대 커넥션 수 (max_connection 고려)
      maximum-pool-size: 50

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        default_batch_fetch_size: 50
        format_sql: true
        show_sql: true
    defer-datasource-initialization: true

logging:
  level:
    org.hibernate.SQL: debug

file:
  dir: ./images/

jwt:
  accessSecretKey: ${ACCESS_SECRET_KEY}
  refreshSecretKey: ${REFRESH_SECRET_KEY}
  access-expiration: ${ACCESS_EXPIRATION}
  refresh-expiration: ${REFRESH_EXPIRATION}