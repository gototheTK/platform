spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  messages:
    # 경로/파일앞부분이름
    # "messages 폴더 안에 있는 message로 시작하는 파일들을 찾아라" 라는 뜻
    basename: messages/message
    encoding: UTF-8

  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    # rewriteBatchedStatements=true가 없으면 Batch Insert가 발동하지 않는다.
    url: jdbc:mysql://localhost:3306/platform_db?rewriteBatchedStatements=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        default_batch_fetch_size: 50
        format_sql: true
        show_sql: true
    defer-datasource-initialization: true

logging:
  level:
    org.hibernate.SQL: debug

file:
  dir: C:/images/