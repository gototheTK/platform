server:
  tomcat:
    threads:
      max: 200 #톰캣의 스레드 (기본 200)
    accept-count: 500 # 톰캣의 스레드외에 대기하는 스레드들

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  messages:
    # 경로/파일앞부분이름
    # "messages 폴더 안에 있는 message로 시작하는 파일들을 찾아라" 라는 뜻
    basename: messages/message
    encoding: UTF-8

  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    # rewriteBatchedStatements=true가 없으면 Batch Insert가 발동하지 않는다.
    url: ${SERVER_DB_URL}
    username: ${SERVER_DB_USERNAME}
    password: ${SERVER_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      # DB 타임아웃보다 약 15~30초 짧게 설정 (단위: ms)
      max-lifetime: 30000
      # 커넥션을 획득하기 위해 대기하는 최대 시간
      connection-timeout: 30000
      # 풀에 유지할 최소 유휴 커넥션 수
      minimum-idle: 10
      # 풀의 최대 커넥션 수 (max_connection 고려)
      maximum-pool-size=: 100

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        default_batch_fetch_size: 50
        format_sql: true
        show_sql: true
    defer-datasource-initialization: true

logging:
  level:
    org.hibernate.SQL: debug

file:
  dir: C:/images/

jwt:
  accessSecretKey: ${ACCESS_SECRET_KEY}
  refreshSecretKey: ${REFRESH_SECRET_KEY}
  access-expiration: ${ACCESS_EXPIRATION}
  refresh-expiration: ${REFRESH_EXPIRATION}